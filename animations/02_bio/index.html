<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下水道システム - 生物反応槽</title>
    <link rel="stylesheet" href="../shared/common.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <a href="../../index.html" class="back-button">メニュー</a>

    <!-- アニメーションエリア（最上部） -->
    <div class="animation-section">
        <!-- 微生物リファレンスパネル（左端固定） -->
        <div class="reference-panel">
            <div class="ref-item">
            活性汚泥
            <br>(微生物たち)
            </div>
            <div class="ref-item">
                <img src="../../material/microbe/kumamushi.png" alt="クマムシ">
                <span>クマムシ</span>
            </div>
            <div class="ref-item">
                <img src="../../material/microbe/mizinko.png" alt="ミジンコ">
                <span>ミジンコ</span>
            </div>
            <div class="ref-item">
                <img src="../../material/microbe/boruke.png" alt="ボルチセラ">
                <span>ツリガネムシ</span>
            </div>
            <div class="ref-item">
                <img src="../../material/microbe/alsera.png" alt="アスペラ">
                <span>アルセラ</span>
            </div>
            <div class="ref-item">
                <img src="../../material/microbe/alsera_side.png" alt="アスペラ(横)">
                <span>アルセラ(横)</span>
            </div>
        </div>
        <div class="animation-area">
            <div class="animation-container-wrapper">
                <!-- ベース画像 -->
                <img src="../../material/02_base_v2.svg" alt="生物反応槽ベース" class="base-image">

                <!-- アニメーションレイヤー群 -->
                <!-- 1. 気泡アニメーション -->
                <div class="bubble-animation-layer">
                    <div class="bubble-tank" id="diffuser-1">
                        <canvas id="bubble-canvas-1"></canvas>
                    </div>
                </div>

                <!-- 2. 微生物アニメーション -->
                <div class="microbe-animation-layer">
                    <div id="microbe-area">
                        <img src="../../material/microbe/alsera.png" class="microbe floating" id="microbe-1a" alt="微生物">
                        <img src="../../material/microbe/alsera.png" class="microbe floating" id="microbe-1b" alt="微生物">
                        <img src="../../material/microbe/alsera_side.png" class="microbe floating" id="microbe-2a" alt="微生物">
                        <img src="../../material/microbe/alsera_side.png" class="microbe floating" id="microbe-2b" alt="微生物">
                        <img src="../../material/microbe/boruke.png" class="microbe floating" id="microbe-3a" alt="微生物">
                        <img src="../../material/microbe/boruke.png" class="microbe floating" id="microbe-3b" alt="微生物">
                        <img src="../../material/microbe/kumamushi.png" class="microbe floating" id="microbe-4a" alt="微生物">
                        <img src="../../material/microbe/kumamushi.png" class="microbe floating" id="microbe-4b" alt="微生物">
                        <img src="../../material/microbe/mizinko.png" class="microbe floating" id="microbe-5a" alt="微生物">
                        <img src="../../material/microbe/mizinko.png" class="microbe floating" id="microbe-5b" alt="微生物">
                    </div>
                </div>

                <!-- 説明用レイヤー -->
                <div class="explanation-layer">
                    <!-- 吹き出し -->
                    <div class="explanation-bubble-title" id="bubble-aerobic">好気槽</div>
                    <div class="explanation-bubble" id="bubble-1">最終沈殿池へ</div>
                    <div class="explanation-bubble" id="bubble-2">返送汚泥</div>
                    <div class="explanation-bubble" id="bubble-3">最初沈殿池から</div>
                    <div class="explanation-bubble" id="bubble-4">散気装置</div>

                    <!-- 矢印 -->
                    <img src="../../material/allow_left_long.svg" class="arrow" id="arrow-1" alt="左矢印">
                    <img src="../../material/allow_left_long.svg" class="arrow" id="arrow-2" alt="左矢印">
                    <img src="../../material/allow_top.svg" class="arrow" id="arrow-3" alt="下矢印">                                                            
                </div>

                <!-- ハイライトエリア（説明文に連動して表示） -->
                <div class="highlight-layer" id="highlightLayer"></div>

            </div>
        </div>
    </div>

    <!-- 説明エリア（下部固定） -->
    <div class="description-section">
        <h1 class="title">生物反応槽</h1>
        <div class="caption-area">
            <p class="caption" id="captionText">
                汚水は、微生物たちの働きにより、きれいになります。この微生物たちを活性汚泥と呼んでいます。
            </p>
        </div>
    </div>

    <script src="script.js"></script>
    <script src="../shared/caption-controller.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 説明文のデータ
            const captions = [
                {
                    text: 'これは、反応槽を横から見た様子です。',
                    highlight: null
                },
                {
                    text: '微生物の中には、汚れを食べてくれるものがいます。',
                    highlight: null
                },
                {
                    text: 'この微生物の働きを利用して、水をきれいにします。',
                    highlight: null
                },
                {
                    text: '微生物が活動できるよう、空気を送ったりしています。',
                    highlight: null
                },
                {
                    text: '底から空気を入れて、微生物を増やし、水をきれいにしています。',
                    highlight: { top: '72%', left: '80%', width: '13%', height: '15%' }
                },
                {
                    text: 'ふわふわしているのは、代表的で特徴のある微生物のイラストです。',
                    highlight: null
                },
                {
                    text: 'この微生物たちを活性汚泥と言います。',
                    highlight: null
                },
                {
                    text: '増えた活性汚泥は、最終沈殿池で集めて、汚泥としてリサイクルします。',
                    highlight: { top: '10%', left: '-10%', width: '20%', height: '15%' }
                },
                {
                    text: '',
                    highlight: null
                }
            ];

            // キャプションコントローラーを初期化（8秒ごとに切り替え）
            new CaptionController(captions, 8000);
        });
    </script>
</body>
</html>
